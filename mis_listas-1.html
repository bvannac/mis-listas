<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Listas</title>
<meta name="theme-color" content="#4472C4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Listas">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }

  /* HEADER */
  header { background: #4472C4; color: white; padding: 18px 16px 14px; position: sticky; top: 0; z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px; }
  .back-btn { background: none; border: none; color: white; font-size: 1.6rem; cursor: pointer; padding: 0 6px 0 0; line-height: 1; font-weight: 300; }
  header h1 { font-size: 1.15rem; font-weight: 700; flex: 1; }

  /* VISTAS */
  .view { display: none; }
  .view.active { display: block; }
  main { padding: 12px 14px 100px; max-width: 500px; margin: 0 auto; }

  /* TARJETAS DE LISTA */
  .list-card { background: white; border-radius: 14px; border: 1.5px solid #e8e8e8; padding: 14px 14px 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; }
  .list-card:active { transform: scale(0.98); }
  .list-card-header { display: flex; align-items: center; gap: 10px; }
  .list-emoji { font-size: 1.5rem; line-height: 1; flex-shrink: 0; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 1rem; font-weight: 600; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-meta { font-size: 0.78rem; color: #999; margin-top: 2px; }
  .list-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .list-action-btn { background: none; border: none; color: #ccc; font-size: 1.4rem; cursor: pointer; padding: 4px 6px; border-radius: 8px; line-height: 1; transition: all 0.15s; }
  .list-action-btn:active { background: #f5f5f5; color: #e05050; }
  .mini-bar-wrap { background: #f0f0f0; border-radius: 20px; height: 5px; margin-top: 10px; }
  .mini-bar { background: #4472C4; border-radius: 20px; height: 5px; transition: width 0.3s; }

  /* FAB (botón flotante nueva lista) */
  .fab { position: fixed; bottom: 28px; right: 20px; width: 58px; height: 58px; border-radius: 50%; background: #4472C4; border: none; color: white; font-size: 2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(68,114,196,0.5); z-index: 30; transition: background 0.15s, transform 0.15s; line-height: 1; }
  .fab:active { background: #2f5aad; transform: scale(0.93); }

  /* SHEET NUEVA LISTA */
  .sheet-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 60; align-items: flex-end; justify-content: center; }
  .sheet-overlay.open { display: flex; }
  .sheet { background: white; border-radius: 22px 22px 0 0; padding: 22px 18px 40px; width: 100%; max-width: 500px; }
  .sheet h3 { font-size: 1rem; font-weight: 700; color: #333; margin-bottom: 18px; }
  .sheet-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .emoji-picker-wrap { position: relative; flex-shrink: 0; }
  .emoji-btn { font-size: 1.5rem; cursor: pointer; background: #f5f5f5; border: 1.5px solid #e0e0e0; border-radius: 12px; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; }
  .emoji-grid { display: none; position: absolute; bottom: 54px; left: 0; background: white; border: 1.5px solid #ddd; border-radius: 14px; padding: 10px; box-shadow: 0 6px 24px rgba(0,0,0,0.14); z-index: 100; flex-wrap: wrap; width: 224px; gap: 2px; }
  .emoji-grid.open { display: flex; }
  .emoji-opt { font-size: 1.4rem; cursor: pointer; padding: 6px; border-radius: 8px; }
  .emoji-opt:active { background: #f0f4ff; }
  .new-list-input { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 24px; font-size: 0.97rem; outline: none; transition: border-color 0.15s; }
  .new-list-input:focus { border-color: #4472C4; }
  .sheet-btns { display: flex; gap: 10px; }
  .sheet-cancel { flex: 1; padding: 13px; border: 1.5px solid #ddd; border-radius: 12px; background: white; font-size: 0.95rem; color: #666; cursor: pointer; }
  .sheet-confirm { flex: 2; padding: 13px; border: none; border-radius: 12px; background: #4472C4; color: white; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
  .sheet-confirm:active { background: #2f5aad; }

  /* VISTA DETALLE */
  .detail-progress { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }
  .progress-bar-wrap { background: rgba(255,255,255,0.25); border-radius: 20px; height: 6px; margin-top: 8px; }
  .progress-bar { background: white; border-radius: 20px; height: 6px; transition: width 0.3s ease; }

  .filters { display: flex; gap: 8px; margin-bottom: 14px; margin-top: 4px; }
  .filter-btn { flex: 1; padding: 7px 4px; border: 1.5px solid #ddd; border-radius: 20px; background: white; font-size: 0.8rem; color: #666; cursor: pointer; text-align: center; transition: all 0.15s; }
  .filter-btn.active { background: #4472C4; border-color: #4472C4; color: white; font-weight: 600; }

  .item { display: flex; align-items: center; gap: 12px; padding: 13px 12px; background: white; border-radius: 12px; margin-bottom: 7px; border: 1.5px solid #e8e8e8; }
  .item.done { background: #f7f7f7; border-color: #ebebeb; }
  .check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .item.done .check { background: #4472C4; border-color: #4472C4; }
  .check svg { display: none; }
  .item.done .check svg { display: block; }
  .label { flex: 1; font-size: 0.97rem; line-height: 1.35; cursor: pointer; }
  .item.done .label { color: #aaa; text-decoration: line-through; }
  .delete-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: none; color: #ccc; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .delete-btn:active { color: #e05050; }

  .empty { text-align: center; color: #bbb; font-size: 0.9rem; padding: 40px 0; }
  .clear-btn { display: block; width: 100%; margin-top: 10px; padding: 11px; background: white; border: 1.5px solid #f0d0d0; border-radius: 10px; font-size: 0.88rem; color: #d05050; cursor: pointer; text-align: center; }

  /* BARRA AÑADIR ITEM */
  .add-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: white; border-top: 1px solid #e8e8e8; padding: 12px 14px 24px; display: flex; gap: 8px; z-index: 10; }
  .add-input { flex: 1; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 24px; font-size: 0.95rem; outline: none; transition: border-color 0.15s; }
  .add-input:focus { border-color: #4472C4; }
  .add-btn { width: 44px; height: 44px; border-radius: 50%; background: #4472C4; border: none; color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .add-btn:active { background: #2f5aad; }

  /* MODAL ELIMINAR LISTA */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 70; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: white; border-radius: 18px; padding: 24px 20px 18px; width: calc(100% - 48px); max-width: 340px; text-align: center; }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .modal p { font-size: 0.88rem; color: #666; margin-bottom: 20px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-cancel { flex: 1; padding: 11px; border: 1.5px solid #ddd; border-radius: 10px; background: white; font-size: 0.92rem; cursor: pointer; }
  .modal-confirm { flex: 1; padding: 11px; border: none; border-radius: 10px; background: #e05050; color: white; font-size: 0.92rem; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<!-- VISTA HOME -->
<div id="view-home" class="view active">
  <header><h1>📋 Mis Listas</h1></header>
  <main>
    <div id="lists-container"></div>
    <div id="home-empty" class="empty" style="display:none">Aún no tienes ninguna lista.<br>Pulsa el botón <strong>+</strong> para crear una.</div>
  </main>
  <button class="fab" onclick="openSheet()" title="Nueva lista">+</button>
</div>

<!-- VISTA DETALLE -->
<div id="view-detail" class="view">
  <header>
    <button class="back-btn" onclick="goHome()">‹</button>
    <h1 id="detail-title">Lista</h1>
    <div style="width:32px"></div>
  </header>
  <main>
    <div class="detail-progress" id="detail-progress">0 de 0 hechos</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="detail-bar" style="width:0%"></div></div>
    <br>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">Pendientes</button>
      <button class="filter-btn" onclick="setFilter('done',this)">Hechos</button>
    </div>
    <div id="items-list"></div>
    <div id="items-empty" class="empty" style="display:none">✨ ¡Todo listo!</div>
    <button class="clear-btn" id="clear-done-btn" onclick="clearDone()" style="display:none">🗑 Borrar los marcados como hechos</button>
  </main>
  <div class="add-bar">
    <input class="add-input" id="item-input" placeholder="Añadir tarea o compra…" maxlength="120">
    <button class="add-btn" onclick="addItem()">+</button>
  </div>
</div>

<!-- SHEET NUEVA LISTA -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheetOutside(event)">
  <div class="sheet">
    <h3>Nueva lista</h3>
    <div class="sheet-row">
      <div class="emoji-picker-wrap">
        <button class="emoji-btn" id="emoji-btn" onclick="toggleEmoji()">📝</button>
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>
      <input class="new-list-input" id="new-list-input" placeholder="Nombre de la lista…" maxlength="40">
    </div>
    <div class="sheet-btns">
      <button class="sheet-cancel" onclick="closeSheet()">Cancelar</button>
      <button class="sheet-confirm" onclick="addList()">Crear lista</button>
    </div>
  </div>
</div>

<!-- MODAL ELIMINAR LISTA -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h3>Eliminar lista</h3>
    <p id="modal-text">¿Seguro que quieres eliminar esta lista?</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-confirm" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<script>
  const EMOJIS = ['📝','🛒','🏠','💊','🧳','🎯','📦','🍎','👗','🔧','🎁','📚','💼','🌿','🐾','💡','🏋️','🎨','🧹','✈️','🏖️','🎒','🐶','🌸','💪'];
  let data = { lists: [] };
  let currentListId = null;
  let currentFilter = 'all';
  let pendingDeleteId = null;
  let selectedEmoji = '📝';

  function load() {
    try { data = JSON.parse(localStorage.getItem('mis_listas_v2') || '{"lists":[]}'); } catch(e) { data = {lists:[]}; }
  }
  function save() {
    try { localStorage.setItem('mis_listas_v2', JSON.stringify(data)); } catch(e) {}
  }

  // EMOJI
  function buildEmojiGrid() {
    document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
      `<span class="emoji-opt" onclick="selectEmoji('${e}')">${e}</span>`).join('');
  }
  function toggleEmoji() { document.getElementById('emoji-grid').classList.toggle('open'); }
  function selectEmoji(e) {
    selectedEmoji = e;
    document.getElementById('emoji-btn').textContent = e;
    document.getElementById('emoji-grid').classList.remove('open');
  }

  // SHEET
  function openSheet() {
    selectedEmoji = '📝';
    document.getElementById('emoji-btn').textContent = '📝';
    document.getElementById('new-list-input').value = '';
    document.getElementById('sheet-overlay').classList.add('open');
    setTimeout(() => document.getElementById('new-list-input').focus(), 100);
  }
  function closeSheet() {
    document.getElementById('sheet-overlay').classList.remove('open');
    document.getElementById('emoji-grid').classList.remove('open');
  }
  function closeSheetOutside(e) {
    if (e.target === document.getElementById('sheet-overlay')) closeSheet();
  }

  // HOME
  function goHome() {
    document.getElementById('view-home').classList.add('active');
    document.getElementById('view-detail').classList.remove('active');
    currentListId = null;
    renderHome();
  }

  function renderHome() {
    const container = document.getElementById('lists-container');
    const empty = document.getElementById('home-empty');
    if (data.lists.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    container.innerHTML = data.lists.map(list => {
      const total = list.items.length;
      const done = list.items.filter(i => i.done).length;
      const pct = total ? Math.round(done / total * 100) : 0;
      return `
        <div class="list-card" onclick="openList(${list.id})">
          <div class="list-card-header">
            <span class="list-emoji">${list.emoji}</span>
            <div class="list-info">
              <div class="list-name">${escHtml(list.name)}</div>
              <div class="list-meta">${total === 0 ? 'Sin elementos' : `${done} de ${total} hechos`}</div>
            </div>
            <div class="list-actions">
              <button class="list-action-btn" onclick="askDelete(event,${list.id})" title="Eliminar">×</button>
            </div>
          </div>
          ${total > 0 ? `<div class="mini-bar-wrap"><div class="mini-bar" style="width:${pct}%"></div></div>` : ''}
        </div>`;
    }).join('');
  }

  function addList() {
    const input = document.getElementById('new-list-input');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    data.lists.unshift({ id: Date.now(), name, emoji: selectedEmoji, items: [] });
    save();
    closeSheet();
    renderHome();
  }

  // MODAL ELIMINAR
  function askDelete(e, id) {
    e.stopPropagation();
    pendingDeleteId = id;
    const list = data.lists.find(l => l.id === id);
    document.getElementById('modal-text').textContent = `¿Seguro que quieres eliminar "${list.name}"? Se borrarán todos sus elementos.`;
    document.getElementById('modal-overlay').classList.add('open');
  }
  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); pendingDeleteId = null; }
  function confirmDelete() {
    data.lists = data.lists.filter(l => l.id !== pendingDeleteId);
    save(); closeModal(); renderHome();
  }

  // DETALLE
  function openList(id) {
    currentListId = id;
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    document.getElementById('view-home').classList.remove('active');
    document.getElementById('view-detail').classList.add('active');
    renderDetail();
  }

  function currentList() { return data.lists.find(l => l.id === currentListId); }

  function renderDetail() {
    const list = currentList();
    if (!list) { goHome(); return; }
    document.getElementById('detail-title').textContent = list.emoji + ' ' + list.name;
    const total = list.items.length;
    const done = list.items.filter(i => i.done).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('detail-progress').textContent = `${done} de ${total} hechos`;
    document.getElementById('detail-bar').style.width = pct + '%';

    const visible = list.items.filter(i => {
      if (currentFilter === 'pending') return !i.done;
      if (currentFilter === 'done') return i.done;
      return true;
    });
    const itemsList = document.getElementById('items-list');
    const empty = document.getElementById('items-empty');
    document.getElementById('clear-done-btn').style.display = done > 0 ? 'block' : 'none';

    if (visible.length === 0) { itemsList.innerHTML = ''; empty.style.display = 'block'; }
    else {
      empty.style.display = 'none';
      itemsList.innerHTML = visible.map(item => `
        <div class="item ${item.done ? 'done' : ''}">
          <div class="check" onclick="toggleItem(${item.id})">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="label" onclick="toggleItem(${item.id})">${escHtml(item.text)}</div>
          <button class="delete-btn" onclick="deleteItem(${item.id})">×</button>
        </div>`).join('');
    }
  }

  function addItem() {
    const input = document.getElementById('item-input');
    const text = input.value.trim();
    if (!text) return;
    currentList().items.unshift({ id: Date.now(), text, done: false });
    input.value = '';
    save(); renderDetail();
  }
  function toggleItem(id) {
    const item = currentList().items.find(i => i.id === id);
    if (item) item.done = !item.done;
    save(); renderDetail();
  }
  function deleteItem(id) {
    currentList().items = currentList().items.filter(i => i.id !== id);
    save(); renderDetail();
  }
  function clearDone() {
    currentList().items = currentList().items.filter(i => !i.done);
    save(); renderDetail();
  }
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderDetail();
  }
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('new-list-input').addEventListener('keydown', e => { if (e.key === 'Enter') addList(); });
  document.getElementById('item-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  document.addEventListener('click', e => {
    if (!e.target.closest('.emoji-picker-wrap')) document.getElementById('emoji-grid').classList.remove('open');
  });

  load();
  buildEmojiGrid();
  renderHome();

  // Registro del Service Worker (PWA)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('✅ Service Worker registrado'))
        .catch(err => console.log('❌ Error SW:', err));
    });
  }
</script>
</body>
</html>
